name: Vitest Projects

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Vitest (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.job_timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        project: [unit, d1, integration, scripts]
        include:
          - project: unit
            job_timeout_minutes: 15
            test_timeout_minutes: 10
          - project: d1
            job_timeout_minutes: 20
            test_timeout_minutes: 15
          - project: integration
            job_timeout_minutes: 30
            test_timeout_minutes: 20
          - project: scripts
            job_timeout_minutes: 20
            test_timeout_minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Install node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test ${{ matrix.project }}
        timeout-minutes: ${{ matrix.test_timeout_minutes }}
        run: pnpm run test:${{ matrix.project }}
