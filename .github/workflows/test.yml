name: Vitest Projects

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Vitest (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.job_timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        project: [unit, d1, integration, scripts]
        include:
          - project: unit
            job_timeout_minutes: 15
            test_timeout_minutes: 10
          - project: d1
            job_timeout_minutes: 20
            test_timeout_minutes: 15
          - project: integration
            job_timeout_minutes: 30
            test_timeout_minutes: 20
          - project: scripts
            job_timeout_minutes: 20
            test_timeout_minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Install node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test ${{ matrix.project }}
        timeout-minutes: ${{ matrix.test_timeout_minutes }}
        run: pnpm run test:${{ matrix.project }}
