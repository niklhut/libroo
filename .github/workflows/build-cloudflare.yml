name: Build Cloudflare Worker

on:
  pull_request:
    branches: [main]

concurrency:
  group: cloudflare-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Cloudflare worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NUXT_CLOUDFLARE_WORKER_NAME: libroo-beta

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Cloudflare worker
        run: pnpm build:cloudflare
