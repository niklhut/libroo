name: Build Cloudflare Worker

on:
  pull_request:
    branches: [main]

concurrency:
  group: cloudflare-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Cloudflare worker
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NUXT_CLOUDFLARE_WORKER_NAME: libroo-production
      NUXT_LEGAL_MARKDOWN_FETCH_TIMEOUT_SECONDS: 5
      NUXT_LEGAL_TERMS_MARKDOWN_URL: ''
      NUXT_OPEN_LIBRARY_COVER_TIMEOUT_SECONDS: 20
      NUXT_OPEN_LIBRARY_REQUEST_TIMEOUT_SECONDS: 12
      NUXT_PLUNK_SEND_TIMEOUT_SECONDS: 5
      NUXT_PUBLIC_LEGAL_TERMS_URL: ''
      NUXT_PUBLIC_TURNSTILE_ENABLED: false
      NUXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Install node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Cloudflare worker
        run: pnpm build:cloudflare
