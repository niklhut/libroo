name: Build Cloudflare Worker

on:
  pull_request:
    branches: [main]

concurrency:
  group: cloudflare-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Cloudflare worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NUXT_CLOUDFLARE_WORKER_NAME: libroo-beta
      NUXT_LEGAL_MARKDOWN_FETCH_TIMEOUT_SECONDS: 5
      NUXT_OPEN_LIBRARY_COVER_TIMEOUT_SECONDS: 20
      NUXT_OPEN_LIBRARY_REQUEST_TIMEOUT_SECONDS: 12
      NUXT_PLUNK_SEND_TIMEOUT_SECONDS: 5
      NUXT_PUBLIC_TURNSTILE_ENABLED: false
      NUXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Cloudflare worker
        run: pnpm build:cloudflare
