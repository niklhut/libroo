name: Deploy to Cloudflare

on:
  push:
    branches: [main]

concurrency:
  group: cloudflare-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
    env:
      NUXT_HUB_CLOUDFLARE_DATABASE_ID: ${{ secrets.NUXT_HUB_CLOUDFLARE_DATABASE_ID }}
      NUXT_HUB_CLOUDFLARE_BUCKET_NAME: ${{ secrets.NUXT_HUB_CLOUDFLARE_BUCKET_NAME }}
      NUXT_CLOUDFLARE_WORKER_NAME: libroo-production
      NUXT_CLOUDFLARE_CUSTOM_DOMAIN: ${{ vars.NUXT_CLOUDFLARE_CUSTOM_DOMAIN }}
      NUXT_BETTER_AUTH_SECRET: ${{ secrets.NUXT_BETTER_AUTH_SECRET }}
      NUXT_BETTER_AUTH_URL: ${{ secrets.NUXT_BETTER_AUTH_URL }}
      NUXT_PLUNK_API_KEY: ${{ secrets.NUXT_PLUNK_API_KEY }}
      NUXT_EMAIL_FROM: ${{ vars.NUXT_EMAIL_FROM }}
      NUXT_EMAIL_REPLY_TO: ${{ vars.NUXT_EMAIL_REPLY_TO }}
      NUXT_EMAIL_VERIFICATION_ENABLED: ${{ vars.NUXT_EMAIL_VERIFICATION_ENABLED || 'true' }}
      NUXT_PLUNK_BASE_URL: ${{ vars.NUXT_PLUNK_BASE_URL }}
      NUXT_PUBLIC_REGISTRATION_ENABLED: ${{ vars.NUXT_PUBLIC_REGISTRATION_ENABLED || 'false' }}
      NUXT_PUBLIC_TURNSTILE_ENABLED: ${{ vars.NUXT_PUBLIC_TURNSTILE_ENABLED || 'true' }}
      NUXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NUXT_PUBLIC_TURNSTILE_SITE_KEY }}
      NUXT_TURNSTILE_ALLOWED_HOSTNAMES: ${{ vars.NUXT_TURNSTILE_ALLOWED_HOSTNAMES }}
      NUXT_TURNSTILE_SECRET_KEY: ${{ secrets.NUXT_TURNSTILE_SECRET_KEY }}
      NUXT_PUBLIC_LEGAL_PRIVACY_POLICY_URL: ${{ vars.NUXT_PUBLIC_LEGAL_PRIVACY_POLICY_URL }}
      NUXT_PUBLIC_LEGAL_IMPRINT_URL: ${{ vars.NUXT_PUBLIC_LEGAL_IMPRINT_URL }}
      NUXT_PUBLIC_LEGAL_TERMS_URL: ${{ vars.NUXT_PUBLIC_LEGAL_TERMS_URL }}
      NUXT_LEGAL_PRIVACY_POLICY_MARKDOWN_URL: ${{ vars.NUXT_LEGAL_PRIVACY_POLICY_MARKDOWN_URL }}
      NUXT_LEGAL_IMPRINT_MARKDOWN_URL: ${{ vars.NUXT_LEGAL_IMPRINT_MARKDOWN_URL }}
      NUXT_LEGAL_TERMS_MARKDOWN_URL: ${{ vars.NUXT_LEGAL_TERMS_MARKDOWN_URL }}
      NUXT_LEGAL_MARKDOWN_FETCH_TIMEOUT_SECONDS: ${{ vars.NUXT_LEGAL_MARKDOWN_FETCH_TIMEOUT_SECONDS || '5' }}
      NUXT_OPEN_LIBRARY_COVER_TIMEOUT_SECONDS: ${{ vars.NUXT_OPEN_LIBRARY_COVER_TIMEOUT_SECONDS || '20' }}
      NUXT_OPEN_LIBRARY_REQUEST_TIMEOUT_SECONDS: ${{ vars.NUXT_OPEN_LIBRARY_REQUEST_TIMEOUT_SECONDS || '12' }}
      NUXT_PLUNK_SEND_TIMEOUT_SECONDS: ${{ vars.NUXT_PLUNK_SEND_TIMEOUT_SECONDS || '5' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate production Turnstile configuration
        run: |
          set -euo pipefail
          if [[ "${NUXT_PUBLIC_TURNSTILE_ENABLED}" == "true" ]]; then
            if [[ -z "${NUXT_PUBLIC_TURNSTILE_SITE_KEY}" ]]; then
              echo "NUXT_PUBLIC_TURNSTILE_SITE_KEY is required when NUXT_PUBLIC_TURNSTILE_ENABLED=true."
              exit 1
            fi
            if [[ -z "${NUXT_TURNSTILE_SECRET_KEY}" ]]; then
              echo "NUXT_TURNSTILE_SECRET_KEY is required when NUXT_PUBLIC_TURNSTILE_ENABLED=true."
              exit 1
            fi
          fi

      - name: Build Cloudflare worker
        run: pnpm build:cloudflare

      - name: Validate production Wrangler configuration
        run: node scripts/production/validate-wrangler-config.mjs .output/server/wrangler.json

      - name: Register GitHub deployment
        id: deployment
        uses: actions/github-script@v8
        env:
          PRODUCTION_ORIGIN: ${{ vars.NUXT_CLOUDFLARE_CUSTOM_DOMAIN }}
        with:
          script: |
            const environmentUrl = /^https?:\/\//.test(process.env.PRODUCTION_ORIGIN)
              ? process.env.PRODUCTION_ORIGIN
              : `https://${process.env.PRODUCTION_ORIGIN}`
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: true
            })
            core.setOutput('deployment_id', deployment.data.id)
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'in_progress',
              environment: 'production',
              environment_url: environmentUrl,
              description: 'Deploying the production Cloudflare Worker'
            })

      - name: Apply production D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler d1 migrations apply DB --remote --config .output/server/wrangler.json

      - name: Sync production Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          node <<'NODE' | pnpm exec wrangler secret bulk --config .output/server/wrangler.json
          const secretNames = [
            'NUXT_BETTER_AUTH_SECRET',
            'NUXT_PLUNK_API_KEY'
          ]
          if (process.env.NUXT_PUBLIC_TURNSTILE_ENABLED === 'true') {
            secretNames.push('NUXT_TURNSTILE_SECRET_KEY')
          }
          const missing = secretNames.filter(name => !process.env[name])
          if (missing.length) {
            console.error(`Missing required Worker secrets: ${missing.join(', ')}`)
            process.exit(1)
          }
          process.stdout.write(JSON.stringify(Object.fromEntries(
            secretNames.map(name => [name, process.env[name]])
          )))
          NODE

      - name: Deploy production worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy --config .output/server/wrangler.json

      - name: Publish production status
        if: always()
        uses: actions/github-script@v8
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
          JOB_STATUS: ${{ job.status }}
          PRODUCTION_ORIGIN: ${{ vars.NUXT_CLOUDFLARE_CUSTOM_DOMAIN }}
        with:
          script: |
            if (!process.env.DEPLOYMENT_ID) {
              core.info('Skipping production status because deployment registration did not complete.')
              return
            }
            const environmentUrl = /^https?:\/\//.test(process.env.PRODUCTION_ORIGIN)
              ? process.env.PRODUCTION_ORIGIN
              : `https://${process.env.PRODUCTION_ORIGIN}`
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: process.env.JOB_STATUS === 'success' ? 'success' : 'failure',
              environment: 'production',
              environment_url: environmentUrl,
              description: process.env.JOB_STATUS === 'success'
                ? 'Production Cloudflare Worker deployed successfully'
                : 'Production Cloudflare Worker deployment failed'
            })
