services:
  libroo:
    image: libroo:local
    ports:
      - "3000:3000"
    environment:
      NUXT_BETTER_AUTH_SECRET: ${NUXT_BETTER_AUTH_SECRET:?set NUXT_BETTER_AUTH_SECRET}
      NUXT_BETTER_AUTH_URL: ${NUXT_BETTER_AUTH_URL:-http://localhost:3000}
      NUXT_LIBROO_RUNTIME_PROFILE: selfhost
      NUXT_DATABASE_URL: file:/data/db/sqlite.db
      NUXT_LOCAL_STORAGE_DIR: /data/blob
      NUXT_EMAIL_VERIFICATION_ENABLED: ${NUXT_EMAIL_VERIFICATION_ENABLED:-false}
      NUXT_PUBLIC_REGISTRATION_ENABLED: ${NUXT_PUBLIC_REGISTRATION_ENABLED:-true}
      NUXT_EMAIL_PROVIDER: ${NUXT_EMAIL_PROVIDER:-smtp}
      NUXT_EMAIL_FROM: ${NUXT_EMAIL_FROM:-}
      NUXT_SMTP_HOST: ${NUXT_SMTP_HOST:-}
      NUXT_SMTP_PORT: ${NUXT_SMTP_PORT:-587}
      NUXT_SMTP_SECURE: ${NUXT_SMTP_SECURE:-false}
      NUXT_SMTP_USER: ${NUXT_SMTP_USER:-}
      NUXT_SMTP_PASSWORD: ${NUXT_SMTP_PASSWORD:-}
      NUXT_PLUNK_API_KEY: ${NUXT_PLUNK_API_KEY:-}
      NUXT_PLUNK_BASE_URL: ${NUXT_PLUNK_BASE_URL:-https://next-api.useplunk.com}
    volumes:
      - libroo-data:/data
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

volumes:
  libroo-data:
